<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-time audio spectrogram visualizer for Indian classical music. Detects harmonic overtones and maps them to musical swaras for vocal practice.">
    <title>Swara Spectrum — Harmonic Overtone Visualizer</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-layout">

        <!-- ═══════════ LEFT PANEL: Controls ═══════════ -->
        <aside class="panel left-panel" id="controls-panel">
            <div class="panel-header">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 32 32" width="28" height="28">
                        <defs>
                            <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#00ffb4"/>
                                <stop offset="100%" stop-color="#50c8ff"/>
                            </linearGradient>
                        </defs>
                        <circle cx="16" cy="16" r="14" fill="none" stroke="url(#logo-grad)" stroke-width="1.5"/>
                        <path d="M10 22 Q12 10 16 16 Q20 22 22 10" fill="none" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <div>
                        <h1 class="app-title">Swara Spectrum</h1>
                        <p class="app-subtitle">Harmonic Overtone Visualizer</p>
                    </div>
                </div>
            </div>

            <div class="panel-body">
                <!-- Status -->
                <div class="status-row">
                    <div class="status-dot" id="status-indicator"></div>
                    <span class="status-label" id="status-text">Stopped</span>
                </div>

                <!-- Start / Stop -->
                <button class="btn primary-btn" id="start-btn" data-running="false">
                    ▶ Start
                </button>

                <!-- Freeze -->
                <button class="btn secondary-btn" id="freeze-btn" data-frozen="false">
                    ⏸ Freeze
                </button>

                <hr class="divider">

                <!-- Tonic (Sa) -->
                <div class="control-group">
                    <label for="tonic-select" class="control-label">
                        <span class="label-icon">🎵</span> Tonic (Sa)
                    </label>
                    <select id="tonic-select" class="control-select">
                        <!-- populated by JS -->
                    </select>
                </div>

                <!-- Tanpura Drone -->
                <div class="control-group drone-group">
                    <div class="drone-header">
                        <label class="control-label">
                            <span class="label-icon">🪕</span> Tanpura Drone
                        </label>
                        <label class="switch">
                            <input type="checkbox" id="drone-toggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="drone-controls" id="drone-controls" style="display: none;">
                        <label for="drone-vol-slider" class="control-label sr-only">Volume</label>
                        <input type="range" id="drone-vol-slider" class="control-slider" min="0" max="100" value="50">
                    </div>
                </div>

                <!-- Shruti System -->
                <div class="control-group">
                    <label for="system-select" class="control-label">
                        <span class="label-icon">🎼</span> Shruti System
                    </label>
                    <select id="system-select" class="control-select">
                        <option value="just" selected>Just Intonation</option>
                        <option value="equal">Equal Temperament</option>
                    </select>
                </div>

                <hr class="divider">

                <!-- Harmonics Count -->
                <div class="control-group">
                    <label for="harmonics-slider" class="control-label">
                        <span class="label-icon">〰️</span> Harmonics
                        <span class="control-value" id="harmonics-value">10</span>
                    </label>
                    <input type="range" id="harmonics-slider" class="control-slider"
                           min="1" max="16" value="10" step="1">
                </div>

                <!-- Sensitivity -->
                <div class="control-group">
                    <label for="sensitivity-slider" class="control-label">
                        <span class="label-icon">📊</span> Sensitivity
                        <span class="control-value" id="sensitivity-value">-60 dB</span>
                    </label>
                    <input type="range" id="sensitivity-slider" class="control-slider"
                           min="-90" max="-20" value="-60" step="1">
                </div>

                <hr class="divider">

                <!-- Export & Record -->
                <div class="export-group">
                    <button class="btn secondary-btn icon-btn" id="export-img-btn" title="Export Spectrogram Image">
                        📸 Export Image
                    </button>
                    <button class="btn secondary-btn icon-btn record-btn" id="record-audio-btn" title="Record Audio Session">
                        ⏺ Record Audio
                    </button>
                </div>
            </div>

            <div class="panel-footer">
                <p class="footer-text">Web Audio API • Canvas 2D</p>
            </div>
        </aside>

        <!-- ═══════════ CENTER: Spectrogram ═══════════ -->
        <main class="spectrogram-container" id="spectrogram-container">
            <canvas id="spectrogram-canvas"></canvas>
            <canvas id="overlay-canvas"></canvas>
            <div class="spectrogram-placeholder" id="spectrogram-placeholder">
                <div class="placeholder-content">
                    <svg viewBox="0 0 64 64" width="48" height="48" class="placeholder-icon">
                        <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(100,180,255,0.3)" stroke-width="1.5"/>
                        <path d="M24 20 v24 M32 14 v36 M40 22 v20 M20 28 v8 M44 26 v12"
                              stroke="rgba(100,180,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                    <p>Press <strong>Start</strong> to begin</p>
                    <p class="placeholder-sub">Grant microphone access when prompted</p>
                </div>
            </div>
        </main>

        <!-- ═══════════ RIGHT PANEL: Info ═══════════ -->
        <aside class="panel right-panel" id="info-panel">
            <div class="panel-header">
                <h2 class="section-title">Fundamental</h2>
            </div>

            <div class="fundamental-card">
                <div class="fundamental-swara" id="fundamental-display">—</div>
                <div class="fundamental-freq" id="fundamental-freq"></div>
                <div class="confidence-track">
                    <div class="confidence-fill" id="confidence-bar"></div>
                </div>
                <div class="confidence-label">Confidence</div>
            </div>

            <div class="panel-body">
                <h2 class="section-title">Detected Harmonics</h2>

                <div class="harmonics-header">
                    <span class="hh-n">#</span>
                    <span class="hh-swara">Swara</span>
                    <span class="hh-freq">Hz</span>
                    <span class="hh-cents">¢</span>
                    <span class="hh-amp">Amplitude</span>
                </div>

                <div class="harmonics-scroll" id="harmonics-list">
                    <div class="no-data">Start audio to see harmonics</div>
                </div>
            </div>
        </aside>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
